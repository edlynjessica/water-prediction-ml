<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ground Water Level Prediction</title>

    <!-- Link CSS -->
    <link rel="stylesheet" href="main.css" />
  </head>

  <body>
    <div class="container">
      <h1>💧 Ground Water Level Prediction</h1>

      <p>
        Predict groundwater levels using environmental and usage data. Enter the
        required values below to estimate future water availability.
      </p>

      <div class="form-group">
        <label>Rainfall (mm)</label>
        <input type="number" class="rainfall" placeholder="Enter rainfall" />
      </div>

      <div class="form-group">
        <label>Daily Usage (liters)</label>
        <input
          type="number"
          class="daily-usage"
          placeholder="Enter daily usage"
        />
      </div>

      <div class="form-group">
        <label>Number of Residents</label>
        <input type="number" class="residents" placeholder="Enter residents" />
      </div>

      <div class="form-group">
        <label>Current Water Level (liters)</label>
        <input
          type="number"
          class="current-level"
          placeholder="Enter current level"
        />
      </div>

      <div class="form-group">
        <label>Tank Capacity (liters)</label>
        <input
          type="number"
          class="tank-capacity"
          placeholder="Enter tank capacity"
        />
      </div>

      <button class="btn" id="predict-btn">Predict Depletion Date</button>

      <div class="result">Days Left to Depletion:</div>
    </div>
    <!-- Link JavaScript -->
    <script src="index.js"></script>
  </body>
</html>
